name: Build and Push Multi-arch Docker Images

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: katherlab/llmaix

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check disk space
        run: df . -h

      - name: Remove unnecessary files
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Free disk space
        run: |
          sudo docker rmi $(docker image ls -aq) >/dev/null 2>&1 || true
          sudo rm -rf \
            /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup \
            /usr/lib/jvm || true
          echo "some directories deleted"
          sudo apt install aptitude -y >/dev/null 2>&1
          sudo aptitude purge aria2 ansible azure-cli shellcheck rpm xorriso zsync \
            esl-erlang firefox gfortran-8 gfortran-9 google-chrome-stable \
            google-cloud-sdk imagemagick \
            libmagickcore-dev libmagickwand-dev libmagic-dev ant ant-optional kubectl \
            mercurial apt-transport-https mono-complete libmysqlclient \
            unixodbc-dev yarn chrpath libssl-dev libxft-dev \
            libfreetype6 libfreetype6-dev libfontconfig1 libfontconfig1-dev \
            snmp pollinate libpq-dev postgresql-client powershell ruby-full \
            sphinxsearch subversion mongodb-org azure-cli microsoft-edge-stable \
            -y -f >/dev/null 2>&1
          sudo aptitude purge google-cloud-sdk -f -y >/dev/null 2>&1
          sudo aptitude purge microsoft-edge-stable -f -y >/dev/null 2>&1 || true
          sudo apt purge microsoft-edge-stable -f -y >/dev/null 2>&1 || true
          sudo aptitude purge '~n ^mysql' -f -y >/dev/null 2>&1
          sudo aptitude purge '~n ^php' -f -y >/dev/null 2>&1
          sudo aptitude purge '~n ^dotnet' -f -y >/dev/null 2>&1
          sudo apt-get autoremove -y >/dev/null 2>&1
          sudo apt-get autoclean -y >/dev/null 2>&1
          echo "some packages purged"

      - name: Check disk space again
        run: df . -h

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      # ------------------------------------------------------------------
      # Smoke test the CPU image (native amd64, loaded locally) before push.
      # ------------------------------------------------------------------
      - name: Build CPU image (amd64) for smoke tests
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile_cpu
          platforms: linux/amd64
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: llmaix-cpu:smoke

      - name: Smoke test - llama-server binary exists and reports version
        run: |
          docker run --rm --entrypoint ls llmaix-cpu:smoke -l /app/llama-server
          docker run --rm --entrypoint /app/llama-server llmaix-cpu:smoke --version

      - name: Smoke test - Python imports succeed
        run: |
          docker run --rm --entrypoint /llmaix/.venv/bin/python llmaix-cpu:smoke \
            -c "import flask, aiohttp, requests, pandas, yaml; print('python imports ok')"

      - name: Smoke test - OCR tools installed
        run: |
          docker run --rm --entrypoint bash llmaix-cpu:smoke \
            -c "command -v tesseract && command -v ocrmypdf && command -v pngquant"

      - name: Smoke test - LLMAIx app starts without entrypoint conflict
        run: |
          docker run --rm --entrypoint /llmaix/.venv/bin/python llmaix-cpu:smoke app.py --help

      - name: Smoke test - generated CLI flags validate against pinned llama-server --help
        run: |
          docker run --rm --entrypoint /llmaix/.venv/bin/python \
            -e LLAMA_SERVER_PATH=/app/llama-server llmaix-cpu:smoke \
            -m unittest webapp.llm_processing.tests.test_server_command -v

      - name: Integration test - LLMAIx API produces a llama.cpp response
        run: |
          # Loads a tiny GGUF from Hugging Face via -hf, waits for readiness and
          # calls the /v1/chat/completions path LLMAIx uses. Needs network access.
          docker run --rm --entrypoint /llmaix/.venv/bin/python \
            -e LLAMA_SERVER_PATH=/app/llama-server \
            -e LLAMA_STARTUP_TIMEOUT=900 \
            llmaix-cpu:smoke \
            -m unittest webapp.llm_processing.tests.test_api_integration -v

      # ------------------------------------------------------------------
      # Build and push images.
      # ------------------------------------------------------------------
      - name: Build and push CPU image (amd64, arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile_cpu
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cpu:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cpu:latest

      - name: Build and push CUDA image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile_cuda
          platforms: linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cuda:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-cuda:latest

      - name: Build and push API-only image (amd64, arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile_api
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:latest
