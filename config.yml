models:
  # Default: Gemma 4 E4B (QAT Q4_0) pulled directly from Hugging Face.
  # llama-server downloads the model automatically on first use - no manual
  # model download or models directory needed.
  - name: "gemma4_e4b_it_qat_q4_0"
    display_name: "Gemma 4 E4B IT QAT Q4_0"
    hf_repo: "google/gemma-4-E4B-it-qat-q4_0-gguf" # <user>/<model> on Hugging Face (must be a GGUF repo)
    # hf_quant: "Q4_K_M" # for repos with multiple quants: selects repo:Q4_K_M (case-insensitive). Not needed here - the repo has a single GGUF.
    # hf_file: "gemma-4-E4B_q4_0-it.gguf" # optional: exact GGUF filename, overrides hf_quant
    # hf_token: "hf_..." # optional: for gated/private repos. Prefer the HF_TOKEN env var instead of putting tokens here.
    model_context_size: 131072 # Right now only informative.
    kv_cache_size: 16000 # Which size should the llama.cpp KV Cache have?
    kv_cache_quants: "q8_0" # e.g. "q8_0", "q4_0" or "f16" - requires flash attention
    flash_attention: true # does not work for some models
    mlock: true
    server_slots: 1 # How many requests should be processed in parallel. Please note: The size of each slot is kv_cache_size / server_slots!
    seed: 42 # Random initialization
    n_gpu_layers: 200 # How many layers to offload to the GPU. You should always try to offload all! Can be set to e.g. 200 to make sure all layers are offloaded for (almost) all models.

  # Local model file - place the .gguf file in your models directory and use
